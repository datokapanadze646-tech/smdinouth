    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 👑 პრემიუმ ნავბარი ლოგოთი */
        .navbar-custom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        .navbar-custom ul {
            display: flex;
            list-style: none;
            gap: 20px;
            padding: 0;
            margin: 0;
            align-items: center;
        }

        .navbar-custom a {
            text-decoration: none;
            color: gold;
            font-weight: 500;
            transition: 0.2s;
        }

        .navbar-custom a:hover {
            color: #e2ba6e;
        }

        .navbar-logo img {
            height: 35px;
            width: auto;
            display: block;
        }

        /* 🛍️ პროდუქტების მონიშვნის კონტეინერი */
        .selection-container {
            max-width: 500px;
            margin: 60px auto;
            background: #141414;
            padding: 35px;
            border-radius: 12px;
            border: 1px solid #c5a059;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .selection-container h2 {
            font-weight: 700;
            margin-bottom: 25px;
            color: #ffffff;
            font-size: 24px;
            border-bottom: 2px solid #c5a059;
            padding-bottom: 10px;
            text-align: center;
        }

        /* 🗹 ჩეკბოქსების სტილი */
        .checkbox-group {
            display: flex;
            align-items: center;
            background: #1d1d1d;
            padding: 14px 18px;
            margin: 12px 0;
            border-radius: 6px;
            border: 1px solid #333;
            transition: 0.2s;
            cursor: pointer;
        }

        .checkbox-group:hover {
            border-color: #c5a059;
            background: #222;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #c5a059;
            margin-right: 15px;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 16px;
            color: #ddd;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }

        /* 💾 ოქროსფერი ღილაკი */
        .save-btn {
            background-color: #c5a059;
            color: #000000;
            border: none;
            padding: 14px;
            width: 100%;
            font-weight: 700;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 20px;
        }

        .save-btn:hover {
            background-color: #e2ba6e;
        }

        footer {
            padding: 30px;
            text-align: center;
            color: #444;
            font-size: 13px;
            margin-top: 50px;
        }
    </style>
</head>

    <main>
        <div class="selection-container">
            <h2>🛍️ მონიშნე შენი პროდუქტები</h2>
            <form id="productsForm" method="POST">
                <div class="checkbox-group">
                    <input type="checkbox" id="clay" name="products" value="hair clay">
                    <label for="clay">Based hair clay</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="salt" name="products" value="sea salt spray">
                    <label for="salt">Based sea salt spray</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="powder" name="products" value="texture powder">
                    <label for="powder">Based texture powder</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="oil" name="products" value="beard oil">
                    <label for="oil">Beard oil</label>
                </div>

                <button type="submit" class="save-btn">არჩევანის შენახვა 💾</button>
            </form>
        </div>
    </main>

    <script>
        if (!localStorage.getItem("isRegistered")) {
            alert("გთხოვთ, ჯერ გაიაროთ რეგისტრაცია!");
            window.location.href = "registracia.html";
        }

        document.getElementById("productsForm").addEventListener("submit", function(event) {
            event.preventDefault();

            let selectedProducts = [];
            if (document.getElementById("clay").checked) selectedProducts.push("hair clay");
            if (document.getElementById("salt").checked) selectedProducts.push("sea salt spray");
            if (document.getElementById("powder").checked) selectedProducts.push("texture powder");
            if (document.getElementById("oil").checked) selectedProducts.push("beard oil");

            localStorage.setItem("myProducts", JSON.stringify(selectedProducts));

            alert("არჩევანი წარმატებით შენახულია! 🎉");
            window.location.href = "propaili.html";
        });
    </script>
