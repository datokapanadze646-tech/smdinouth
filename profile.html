<div class="container">
    <div class="checkout-container">
        <h3 class="text-center mb-4" style="color: #c5a059;">გადახდის დეტალები</h3>

        <div class="mb-4 p-3" style="border: 1px solid #333; border-radius: 5px;">
            <p>პროდუქტი: <b id="product-name">იტვირთება...</b></p>
            <p>ჯამი: <b id="product-price" style="color: #c5a059;">$0.00</b></p>
        </div>

        <form>
            <div class="mb-3">
                <label>სახელი და გვარი</label>
                <input type="text" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>ელ-ფოსტა</label>
                <input type="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>ტელეფონის ნომერი</label>
                <input type="tel" class="form-control" placeholder="+995 XXX XXX XXX" required>
            </div>
            <div class="mb-3">
                <label>საცხოვრებელი მისამართი</label>
                <input type="text" class="form-control" placeholder="ქალაქი, ქუჩა, ბინა" required>
            </div>

            <div class="mb-3">
                <label>ბარათის ნომერი</label>
                <input type="text" class="form-control" placeholder="0000 0000 0000 0000" required>
            </div>
            <div class="row">
                <div class="col-6 mb-3">
                    <label>ვადა</label>
                    <input type="text" class="form-control" placeholder="MM/YY">
                </div>
                <div class="col-6 mb-3">
                    <label>CVV</label>
                    <input type="text" class="form-control" placeholder="123">
                </div>
            </div>

            <a href="games.html" class="btn btn-gold">გადახდის დადასტურება</a>
        </form>
